
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Análise de Conciliações</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .card h3 {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
        }
        .card .value {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0 0 0;
        }
        .links {
            text-align: center;
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            background: #0066cc;
            color: white;
            padding: 12px 20px;
            margin: 10px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .links a:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboard - Análise de Conciliações</h1>
        
        <div class="grid">
            <div class="card">
                <h3>Total de Registros</h3>
                <div class="value">451</div>
            </div>
            <div class="card">
                <h3>Valor Total</h3>
                <div class="value">R$ 1,020,359.82</div>
            </div>
            <div class="card">
                <h3>Registros Matched</h3>
                <div class="value">332</div>
            </div>
            <div class="card">
                <h3>Taxa de Match</h3>
                <div class="value">73.6%</div>
            </div>
        </div>

        <div class="links">
            <h2>📈 Gráficos Disponíveis</h2>
            <a href="grafico_status.html">📊 Distribuição por Status</a>
            <a href="grafico_valor_status.html">💰 Valor por Status</a>
            <a href="grafico_top_suppliers.html">🏆 Top 10 Suppliers</a>
            <a href="grafico_temporal.html">📅 Série Temporal</a>
        </div>
    </div>
</body>
</html>
