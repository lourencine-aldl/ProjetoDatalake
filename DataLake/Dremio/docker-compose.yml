version: "3.8"

services:
  dremio:
    image: dremio/dremio-oss:latest
    container_name: dremio-oss
    restart: no
    tty: true

    # 👉 usa a mesma rede do host (herda VPN, DNS e rotas)
    network_mode: "host"

    volumes:
      # Metastore, catálogo e reflections (PERSISTENTE)
      - ./dremio_data:/opt/dremio/data
      # Configurações do Dremio (PERSISTENTE)
      - ./dremio_conf:/opt/dremio/conf

    environment:
      - TZ=America/Sao_Paulo
      # ajuste opcional de memória
      # - EXTRA_JAVA_OPTS=-Xmx6G

    ulimits:
      nofile:
        soft: 65536
        hard: 262144

    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:9047/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
