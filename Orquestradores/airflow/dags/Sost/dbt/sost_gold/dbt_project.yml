name: "sost_gold"
version: "1.0.0"
config-version: 2

profile: "sost_gold"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  sost_gold:
    +schema: "{{ env_var('DBT_GOLD_SCHEMA', env_var('DBT_DW_SCHEMA', 'public')) }}"
    staging:
      +materialized: view
    gold:
      +materialized: table
